<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico Gratuito — Meu Filho Come!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#e63946;--red2:#c0392b;--pink:#e8698d;--dark:#1a1a2e;--light:#636e72;--text:#2d3436}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#fff8f2 0%,#fff2f6 55%,#f5f0ff 100%);min-height:100vh;overflow-x:hidden;color:var(--text)}

/* ── TOPO ── */
.top-bar{padding:18px 5%;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,248,242,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(230,57,70,.08)}
.logo{font-size:18px;font-weight:800;color:var(--red)}
.logo span{color:var(--pink)}
.progress-wrap{flex:1;max-width:320px;margin:0 auto}
.progress-label{font-size:11px;color:var(--light);font-weight:600;text-align:center;margin-bottom:5px}
.progress-bar{height:5px;background:#f0d0d8;border-radius:50px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--pink));border-radius:50px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.free-badge{font-size:11px;font-weight:700;color:var(--red);background:rgba(230,57,70,.1);padding:4px 12px;border-radius:50px;border:1px solid rgba(230,57,70,.2)}

/* ── SLIDE ── */
.quiz-stage{min-height:100vh;padding:100px 5% 60px;display:flex;align-items:center;justify-content:center}
.quiz-slide{max-width:680px;width:100%;animation:slideIn .45s cubic-bezier(.4,0,.2,1)}
@keyframes slideIn{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-20px)}}
.quiz-slide.leaving{animation:slideOut .3s cubic-bezier(.4,0,.2,1) forwards}

.q-step{font-size:12px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.q-text{font-size:28px;font-weight:800;color:var(--dark);line-height:1.3;margin-bottom:8px}
.q-sub{font-size:15px;color:var(--light);margin-bottom:36px;line-height:1.6;font-style:italic}
.q-sub strong{color:var(--red);font-style:normal}

/* ── OPÇÕES ── */
.options{display:flex;flex-direction:column;gap:13px}
.opt{display:flex;align-items:center;gap:16px;padding:18px 22px;border-radius:16px;border:2px solid #f0d8e0;background:#fff;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.opt::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(230,57,70,.04),transparent);opacity:0;transition:opacity .2s}
.opt:hover{border-color:rgba(230,57,70,.4);background:#fff8f8;transform:translateX(6px);box-shadow:0 6px 24px rgba(230,57,70,.1)}
.opt:hover::after{opacity:1}
.opt.picked{border-color:var(--red);background:linear-gradient(90deg,#fff0f0,#fff);box-shadow:0 6px 28px rgba(230,57,70,.18)}
.opt-ico{font-size:24px;flex-shrink:0;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:#f8f0f2;border-radius:12px;transition:background .2s}
.opt.picked .opt-ico{background:rgba(230,57,70,.14)}
.opt-body{flex:1}
.opt-txt{font-size:15px;font-weight:600;color:var(--dark);line-height:1.3}
.opt-desc{font-size:12px;color:var(--light);margin-top:3px;line-height:1.4}
.opt-check{width:22px;height:22px;border-radius:50%;border:2px solid #ddd;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px}
.opt.picked .opt-check{background:var(--red);border-color:var(--red);color:#fff}

/* ── RESULTADO ── */
.result-slide{max-width:680px;width:100%;text-align:center;animation:slideIn .5s cubic-bezier(.4,0,.2,1)}
.result-anim{font-size:72px;animation:pulse 1.5s ease-in-out infinite;display:block;margin-bottom:20px}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.result-badge{display:inline-block;background:linear-gradient(135deg,var(--red),var(--pink));color:#fff;padding:7px 22px;border-radius:50px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:22px}
.result-title{font-size:30px;font-weight:800;color:var(--dark);margin-bottom:14px;line-height:1.3}
.result-title span{color:var(--red)}
.result-msg{font-size:17px;font-weight:700;color:var(--dark);line-height:1.5;margin-bottom:24px;max-width:520px;margin-left:auto;margin-right:auto}
.result-msg span{color:var(--red)}
/* ── Espelho da dor ── */
.mirror-box{background:linear-gradient(135deg,#fff5f5,#fff0f5);border-radius:16px;padding:20px 22px;margin-bottom:24px;text-align:left}
.mirror-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--red);margin-bottom:14px}
.mirror-items{display:flex;flex-direction:column;gap:10px}
.mirror-item{display:flex;align-items:center;gap:12px;font-size:15px;font-weight:600;color:var(--dark)}
.mirror-item-ico{font-size:22px;flex-shrink:0}
.mirror-closing{font-size:13px;color:var(--light);margin-top:14px;padding-top:12px;border-top:1px solid rgba(230,57,70,.12);font-style:italic}
/* ── Future pacing ── */
.future-box{background:#fff;border:1px solid rgba(230,57,70,.12);border-radius:18px;padding:24px;margin-bottom:28px;text-align:left;box-shadow:0 4px 20px rgba(230,57,70,.07)}
.future-label{font-size:13px;font-weight:700;color:var(--light);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.future-title{font-size:17px;font-weight:800;color:var(--dark);margin-bottom:16px;line-height:1.4}
.future-items{display:flex;flex-direction:column;gap:10px}
.future-item{display:flex;align-items:flex-start;gap:10px;font-size:14px;color:var(--text);line-height:1.5}
.future-item-ico{font-size:18px;flex-shrink:0;margin-top:1px}
/* ── CTA ── */
.result-cta-box{background:linear-gradient(135deg,#1a1a2e,#2d0a18);border-radius:20px;padding:32px 28px;text-align:center}
.result-cta-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.5);margin-bottom:12px}
.result-cta-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:10px;line-height:1.3}
.result-cta-sub{font-size:14px;color:rgba(255,255,255,.65);margin-bottom:24px;line-height:1.7}
.btn-go{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:20px 36px;border-radius:50px;background:linear-gradient(135deg,var(--red),#ff6b6b);color:#fff;font-size:18px;font-weight:800;border:none;cursor:pointer;box-shadow:0 8px 36px rgba(230,57,70,.55);transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;width:100%}
.btn-go::after{content:'';position:absolute;top:0;left:-130%;width:55%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.28),transparent);transform:skewX(-15deg);animation:shimmer 3s infinite 1.5s}
@keyframes shimmer{0%,20%{left:-130%}55%,100%{left:165%}}
.btn-go:hover{transform:translateY(-3px);box-shadow:0 14px 44px rgba(230,57,70,.65)}
.btn-go-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:10px}
.result-guarantee{margin-top:16px;font-size:12px;color:rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;gap:6px}
/* ── Traits ── */
.result-traits{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;text-align:left}
.trait{background:#fff;border:1px solid rgba(230,57,70,.12);border-radius:14px;padding:16px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 4px 16px rgba(230,57,70,.07)}
.trait-ico{font-size:22px;flex-shrink:0}
.trait-txt{font-size:13px;color:var(--text);line-height:1.5;font-weight:500}
/* ── Botão Prosseguir ── */
.btn-next-wrap{margin-top:24px;display:flex;justify-content:flex-end}
.btn-next{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:50px;background:linear-gradient(135deg,var(--red),#ff6b6b);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;box-shadow:0 6px 22px rgba(230,57,70,.38);transition:all .25s;opacity:0;pointer-events:none;transform:translateY(8px)}
.btn-next.visible{opacity:1;pointer-events:all;transform:translateY(0)}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(230,57,70,.5)}

/* ── LOADING ── */
.loading-slide{text-align:center;max-width:480px;width:100%}
.loading-ico{font-size:56px;margin-bottom:24px;animation:spin 1.2s linear infinite;display:block}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.loading-title{font-size:22px;font-weight:800;color:var(--dark);margin-bottom:10px}
.loading-sub{font-size:15px;color:var(--light);line-height:1.6}
.dots span{animation:blink 1.4s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}

/* ── RESPONSIVE ── */
@media(max-width:600px){
.q-text{font-size:22px}
.result-traits{grid-template-columns:1fr}
.result-title{font-size:24px}
.top-bar .free-badge{display:none}
}
</style>
</head>
<body>

<!-- TOPO FIXO -->
<div class="top-bar">

const PROFILES = [
  {
    badge: 'Seletividade em Estágio Inicial',
    ico: '🌱',
    title: 'Seu filho está no começo — e isso é uma <span>grande vantagem</span>',
    msg: 'Identificamos sinais de seletividade em fase inicial. Agir agora, com as técnicas certas, é o que vai impedir que isso se consolide em um padrão difícil de quebrar. Você chegou no momento certo.',

let step = 0;
let answers = [];

function getProfile() {
  const score = answers.slice(1, 5).reduce((s, a) => s + a, 0);
  if (score <= 4) return 0;
  if (score <= 8) return 1;
  return 2;
}

function render() {
  const slide = document.getElementById('quizSlide');
  const data = Q[step];
  const pct = ((step + 1) / Q.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `Pergunta ${step + 1} de ${Q.length}`;
  const isLast = step === Q.length - 1;

  slide.innerHTML = `
    <div class="q-step">Pergunta ${step + 1} de ${Q.length}</div>
    <div class="q-text">${data.text}</div>
    <div class="q-sub">${data.sub}</div>
    <div class="options">
      ${data.opts.map((o, i) => `
        <div class="opt" onclick="pick(this, ${i})">
          <div class="opt-ico">${o.ico}</div>
          <div class="opt-body">
            <div class="opt-txt">${o.txt}</div>
            ${o.desc ? `<div class="opt-desc">${o.desc}</div>` : ''}
          </div>
          <div class="opt-check">✓</div>
        </div>
      `).join('')}
    </div>
    <div class="btn-next-wrap">
      <button class="btn-next" id="btnNext" onclick="nextStep()">
        ${isLast ? 'Ver meu diagnóstico ✨' : 'Prosseguir →'}
      </button>
    </div>
  `;
}

function pick(el, idx) {
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('picked'));
  el.classList.add('picked');
  answers[step] = idx;
  const btn = document.getElementById('btnNext');
  if (btn) btn.classList.add('visible');
}

function nextStep() {
  step++;
  const slide = document.getElementById('quizSlide');
  slide.classList.add('leaving');
  setTimeout(() => {
    slide.classList.remove('leaving');
    if (step < Q.length) {
      render();
    } else {
      showLoading();
    }
  }, 300);
}

function showLoading() {
  const stage = document.getElementById('quizStage');
  document.getElementById('progressLabel').textContent = 'Analisando suas respostas...';
  document.getElementById('progressFill').style.width = '100%';

  stage.innerHTML = `
    <div class="loading-slide">
      <span class="loading-ico">⚙️</span>
      <div class="loading-title">Analisando suas respostas<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
      <div class="loading-sub">Estamos montando o diagnóstico personalizado<br>para o seu filho. Um segundo...</div>
    </div>
  `;

  setTimeout(showResult, 2200);
}

function getMirror() {
  const feelingsIco = ['😤','😟','😢','💔'];
  const feelingsTxt = ['Sente frustração quando ele recusa','Tem medo de ele não crescer bem','Carrega culpa — como se fosse sua falha','Sente tudo ao mesmo tempo'];
  const mealtimeIco = ['⚡','😰','🚧','⚔️'];
  const mealtimeTxt = ['A refeição é tensa para a família','Já chega com medo do que vai acontecer','Evita alimentos só para ter paz','A refeição virou um campo de batalha'];
  const triedIco = ['🌱','📱','📚','😓'];
  const triedTxt = ['Ainda não sabe por onde começar','Pesquisou muito, sem resultado','Estudou bastante — nada funcionou','Tentou tudo e está exausta'];

  return [
    {ico: feelingsIco[answers[2]??0], txt: feelingsTxt[answers[2]??0]},
    {ico: mealtimeIco[answers[7]??0], txt: mealtimeTxt[answers[7]??0]},
    {ico: triedIco[answers[5]??0],    txt: triedTxt[answers[5]??0]}
  ];
}
